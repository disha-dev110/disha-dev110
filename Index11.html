<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disha Khatun | Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            max-width: 500px;
            animation: fadeIn 1.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #fff; }
        p { font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; opacity: 0.9; }
        .badge {
            display: inline-block;
            background: #e74c3c;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            background: white;
            color: #1e3c72;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #e74c3c; color: white; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">HSC Candidate 2026</div>
        <h1>Hi, I'm Disha Khatun</h1>
        <p>I am a passionate learner exploring the world of <b>Artificial Intelligence</b> and <b>Web Development</b>. My dream is to build technology that helps people.</p>
        <a href="#" class="btn">View My Projects</a>
    </div>
</body>
</html>
